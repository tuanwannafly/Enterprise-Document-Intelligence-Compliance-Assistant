name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edi
          POSTGRES_USER: edi_owner
          POSTGRES_PASSWORD: edi_owner
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U edi_owner -d edi"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg2://edi_owner:edi_owner@localhost:5432/edi
      DEV_AUTH_MODE: "true"
      DEV_AUTH_SHARED_SECRET: ci-shared-secret
      VECTOR_STORE: memory
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ci
      AWS_SECRET_ACCESS_KEY: ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Bootstrap database
        env:
          PGPASSWORD: edi_owner
        run: |
          psql -h localhost -U edi_owner -d edi -f app/db/bootstrap.sql || true
          PYTHONPATH=. alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        run: pytest

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: false
          tags: edi-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: edi-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f infrastructure/docker/Dockerfile.backend .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          cd backend && PYTHONPATH=. alembic upgrade head

      - name: Force ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster edi-compliance-cluster \
            --service edi-compliance-backend \
            --force-new-deployment
